{% extends 'Base/selector.html' %}
{% load static %}

{% block recursos %}
<div class="container-fluid mt-3">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Nuevo Local</h5>
                    <a href="{% url 'Listar_Locales' %}" class="btn btn-sm btn-secondary">
                        <i class="bi bi-x-circle"></i> Cancelar
                    </a>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="row g-2">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    {{ form.tipo.label_tag }}
                                    {{ form.tipo }}
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    {{ form.piso.label_tag }}
                                    {{ form.piso }}
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    {{ form.numero.label_tag }}
                                    {{ form.numero }}
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-3">
                            <i class="bi bi-save"></i> Guardar Local
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.0/font/bootstrap-icons.css">
{% endblock %}
