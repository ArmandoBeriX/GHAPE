{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestor de Horarios Académicos para Profesores y Estudiantes">
    <title>Cambiar Contraseña de  Usuario</title>
</head>
<body style="background-color: rgb(0, 2, 89);">
    <nav class="navbar navbar-expand-lg navbar-light" style="background-color: white;">
        <div class="container-fluid">
            <a class="navbar-brand" href="https://eva.uci.cu/" style="color: rgb(231, 163, 18);">
                Gestor de Horarios Académicos para Profesores y Estudiantes
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="ms-auto d-flex align-items-center">
                    <a href="{% url 'Listar_Usuarios' %}" class="btn btn-success">Cancelar</a> <!-- Cambiado a Listar_Usuarios -->
                </div>
            </div>
        </div>
    </nav>

    <div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div>
            <form action="" method="POST" class="container mt-5 p-4 bg-white rounded shadow">
                {% csrf_token %}
                <div class="card mx-auto" style="width: 30rem;">
                    <div class="card-body">
                        <h5 class="card-title">Establezca los nuevos parámetros</h5>
                        {{ form }} <!-- Muestra el formulario como párrafos -->
                    </div>
                </div>
                <button type="submit" class="btn btn-warning w-100">Actualizar Contraseña</button>
            </form>
        </div>
    </div>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
