{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestor de Horarios Académicos para Profesores y Estudiantes">
    <title>Inicio de Sesión</title>
    <!-- Bootstrap CSS local -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <style>
        body {
            background-color: rgb(0, 2, 89);
            min-height: 100vh;
        }
        .login-container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .navbar-brand {
            color: rgb(231, 163, 18) !important;
            font-weight: bold;
        }
        .btn-primary {
            background-color: rgb(0, 2, 89);
            border-color: rgb(0, 2, 89);
        }
        .btn-primary:hover {
            background-color: rgb(0, 20, 120);
            border-color: rgb(0, 20, 120);
        }
    </style>
</head>
<body>
    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white">
        <div class="container-fluid">
            <a class="navbar-brand" href="https://eva.uci.cu/">
                Gestor de Horarios Académicos para Profesores y Estudiantes
            </a>
            <div class="ms-auto d-flex align-items-center">
                <a href="{% url 'Principal' %}" class="btn btn-success">Ir al Inicio</a>
            </div>
        </div>
    </nav>
    
    <!-- Formulario de Login -->
    <div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="login-container p-4" style="width: 100%; max-width: 500px;">
            <form method="POST" action="{% url 'Login' %}">
                {% csrf_token %}
                
                <!-- Mensajes de Django -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <div class="mb-3">
                    <label for="username" class="form-label">Nombre de Usuario:</label>
                    <input type="text" name="username" id="username" class="form-control" 
                           placeholder="Nombre de Usuario" required autofocus
                           value="{{ username|default:'' }}">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña:</label>
                    <input type="password" name="password" id="password" 
                           class="form-control" placeholder="Contraseña" required>
                </div>

                <div class="d-flex flex-column gap-2">
                    <button type="submit" class="btn btn-primary w-100 py-2">Ingresar</button>
                    <a href="{% url 'Registro' %}" class="btn btn-success w-100">Crear una Cuenta</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS local -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
